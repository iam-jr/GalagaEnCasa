<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="80" fill="#000428"/>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000428"/>
      <stop offset="100%" stop-color="#004e92"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Green border glow -->
  <rect x="8" y="8" width="496" height="496" rx="76" fill="none" stroke="#00ff00" stroke-width="8" opacity="0.9" filter="url(#glow)"/>
  <!-- Rocket emoji -->
  <text x="256" y="330" font-size="280" text-anchor="middle" font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif">🚀</text>
</svg>
